name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.preset }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        preset: [dev, asan]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build clang clang-tidy clang-format lcov

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} -j

      - name: Test
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

  lint:
    name: Lint (clang-format + clang-tidy)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build clang clang-tidy clang-format

      - name: Configure (for compile_commands.json)
        run: cmake --preset dev

      - name: Run lint
        run: bash tools/lint.sh

  coverage:
    name: Coverage Report
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build gcc g++ lcov

      - name: Run coverage
        run: bash tools/coverage.sh

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/coverage/coverage-report/

  changelog-check:
    name: Changelog Updated
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check CHANGELOG.md was modified
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q CHANGELOG.md || \
          (echo "ERROR: CHANGELOG.md was not updated in this PR." && exit 1)
